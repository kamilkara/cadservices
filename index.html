<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHUD - The Universal Smart Macro HUD</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #f1c40f;
            --btn-color: #27ae60;
            --btn-hover: #219653;
            --card-bg: #1e293b;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        header { background-color: #1a202c; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--accent-color); }
        .nav-btn { background-color: var(--btn-color); color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; color: #ffffff; }
        .hero h2 { font-size: 1.2rem; color: #94a3b8; margin-bottom: 30px; }

        /* PLAYLIST PLAYER */
        .video-player-box {
            position: relative;
            background-color: #000;
            border-radius: 12px;
            margin: 40px 0;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #334155;
            cursor: pointer;
        }

        #mainVideo { width: 100%; height: auto; display: block; opacity: 1; transition: opacity 0.4s ease-in-out; }
        
        /* Badge for the current video title */
        .video-status { position: absolute; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); color: var(--accent-color); padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; z-index: 5; }

        /* Play Overlay Logic */
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.3s;
        }
        .play-button {
            width: 70px; height: 70px; background-color: var(--accent-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }
        .play-button svg { fill: #0f172a; width: 30px; height: 30px; margin-left: 5px; }
        
        .playing .play-overlay { opacity: 0; pointer-events: none; }

        footer { margin-top: 60px; color: #64748b; font-size: 0.9rem; padding-bottom: 40px; }
        footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">OmniHUD<span>.</span></a>
        <a href="https://k2smart.gumroad.com/l/omnihud" class="nav-btn">Get OmniHUD</a>
    </header>

    <div class="container">
        <div class="hero">
            <h1>Workflow Automation, Redefined.</h1>
            <h2>Experience the future of productivity with our dual-video showcase.</h2>
        </div>

        <div id="playerBox" class="video-player-box">
            <div id="videoBadge" class="video-status">Intro Clip</div>
            
            <div id="playOverlay" class="play-overlay">
                <div class="play-button">
                    <svg viewBox="0 0 448 512"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z"/></svg>
                </div>
            </div>
            
            <video id="mainVideo" muted playsinline preload="auto">
                <source src="https://cdn.cad.services/advertVideo.mp4" type="video/mp4">
            </video>
        </div>

        <footer>
            <p>© 2026 cad.services | <a href="/support#help">Help</a> | <a href="/support#terms">Terms</a></p>
        </footer>
    </div>

    <script>
        const playerBox = document.getElementById('playerBox');
        const videoElement = document.getElementById('mainVideo');
        const badgeElement = document.getElementById('videoBadge');

        // GÜNCEL PLAYLIST
        const playlist = [
            { src: "https://cdn.cad.services/advertVideo.mp4", label: "Quick Intro" },
            { src: "https://cdn.cad.services/fullVideo.mp4", label: "Full Showcase" }
        ];

        let currentTrack = 0;

        // Tıklayınca başlat
        playerBox.addEventListener('click', () => {
            if (videoElement.paused) {
                videoElement.play().then(() => {
                    playerBox.classList.add('playing');
                });
            }
        });

        // Video bittiğinde diğerine geç
        videoElement.addEventListener('ended', () => {
            currentTrack++;
            
            // İkinci video bittikten sonra başa dönsün mü? (Döngü için kalsın)
            if (currentTrack >= playlist.length) {
                currentTrack = 0;
            }

            playTrack(currentTrack);
        });

        function playTrack(index) {
            videoElement.style.opacity = 0; // Yumuşak geçiş
            
            setTimeout(() => {
                videoElement.src = playlist[index].src;
                badgeElement.innerText = playlist[index].label;
                videoElement.load();
                videoElement.play();
                videoElement.style.opacity = 1;
            }, 400);
        }
    </script>
</body>
</html>
